openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Clinical Medical Report Analysis API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analysis
    description: Medical report analysis operations
  - name: auth
    description: Authentication operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analysis/analyze:
    post:
      operationId: analyzeReport
      tags: [analysis]
      summary: Analyze a medical report
      description: Runs the full deterministic clinical analysis pipeline and generates an LLM explanation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeReportBody"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Invalid or inconsistent medical data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analysis/history:
    get:
      operationId: getAnalysisHistory
      tags: [analysis]
      summary: Get recent analysis history
      description: Returns the most recent analyses
      responses:
        "200":
          description: List of past analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalysisHistoryItem"

  /analysis/history/{id}:
    get:
      operationId: getAnalysisById
      tags: [analysis]
      summary: Get a specific analysis by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analysis/stats:
    get:
      operationId: getAnalysisStats
      tags: [analysis]
      summary: Get aggregate stats across all analyses
      description: Summary counts of risk levels, urgency, abnormal parameter frequencies
      responses:
        "200":
          description: Aggregate stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthUser:
      type: object
      properties:
        username:
          type: string
        displayName:
          type: string
      required:
        - username
        - displayName

    AnalyzeReportBody:
      type: object
      description: Medical lab values for analysis. All values optional but at least one required.
      properties:
        patientName:
          type: ["string", "null"]
          description: Optional patient name or identifier
        hemoglobin:
          type: ["number", "null"]
          description: Hemoglobin level in g/dL
        wbc:
          type: ["number", "null"]
          description: White blood cell count per microliter
        glucose:
          type: ["number", "null"]
          description: Blood glucose in mg/dL
        vitaminD:
          type: ["number", "null"]
          description: Vitamin D level in ng/mL
        cholesterol:
          type: ["number", "null"]
          description: Total cholesterol in mg/dL
        platelets:
          type: ["number", "null"]
          description: Platelet count per microliter
        doctorRemarks:
          type: ["string", "null"]
          description: Optional doctor remarks that can override urgency

    SeverityLevel:
      type: string
      enum: [Normal, Borderline Low, Low, Severely Low, Borderline High, High, Severely High, Deficiency]

    SeverityBreakdown:
      type: object
      description: Severity classification for each provided parameter
      properties:
        hemoglobin:
          type: ["string", "null"]
        wbc:
          type: ["string", "null"]
        glucose:
          type: ["string", "null"]
        vitaminD:
          type: ["string", "null"]
        cholesterol:
          type: ["string", "null"]
        platelets:
          type: ["string", "null"]

    AnalysisResult:
      type: object
      required:
        - explanation
        - risk_level
        - urgency
        - severity_breakdown
        - abnormal_count
        - confidence
        - confidence_reason
        - recommendations
        - disease_risks
        - clinical_insights
        - validation_status
        - completeness_score
      properties:
        id:
          type: ["integer", "null"]
        patientName:
          type: ["string", "null"]
        explanation:
          type: string
          description: Plain-English explanation generated by LLM based only on validated values
        risk_level:
          type: string
          enum: [Low, Moderate, High]
        urgency:
          type: string
          enum: [Routine, Soon, Immediate]
        severity_breakdown:
          $ref: "#/components/schemas/SeverityBreakdown"
        abnormal_count:
          type: integer
        confidence:
          type: number
          description: Confidence score 0.0–1.0
        confidence_reason:
          type: string
        completeness_score:
          type: number
          description: Data completeness ratio 0.0–1.0 (provided parameters / 6 total)
        recommendations:
          type: array
          items:
            type: string
        disease_risks:
          type: array
          items:
            type: string
          description: Deterministically mapped disease risks from abnormal values
        clinical_insights:
          type: array
          items:
            type: string
          description: Correlation-based clinical insights
        validation_status:
          type: string
          enum: [Clinically Verified, Invalid Data, Insufficient Data]
        createdAt:
          type: ["string", "null"]

    AnalysisHistoryItem:
      type: object
      required:
        - id
        - risk_level
        - urgency
        - abnormal_count
        - confidence
        - validation_status
        - createdAt
        - completeness_score
      properties:
        id:
          type: integer
        patientName:
          type: ["string", "null"]
        risk_level:
          type: string
        urgency:
          type: string
        abnormal_count:
          type: integer
        confidence:
          type: number
        completeness_score:
          type: number
        validation_status:
          type: string
        createdAt:
          type: string

    AnalysisStats:
      type: object
      required:
        - totalAnalyses
        - riskLevelCounts
        - urgencyCounts
        - mostFrequentAbnormalities
        - averageConfidence
        - averageAbnormalCount
      properties:
        totalAnalyses:
          type: integer
        riskLevelCounts:
          type: object
          properties:
            Low:
              type: integer
            Moderate:
              type: integer
            High:
              type: integer
          required: [Low, Moderate, High]
        urgencyCounts:
          type: object
          properties:
            Routine:
              type: integer
            Soon:
              type: integer
            Immediate:
              type: integer
          required: [Routine, Soon, Immediate]
        mostFrequentAbnormalities:
          type: array
          items:
            type: object
            properties:
              parameter:
                type: string
              count:
                type: integer
            required: [parameter, count]
        averageConfidence:
          type: number
        averageAbnormalCount:
          type: number
